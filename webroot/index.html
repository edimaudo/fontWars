<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>fontWars</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
        }
        
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f5f5f5;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* WCAG 2.1 Screen Reader Only class */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <h1 class="sr-only">fontWars: Typographical Skill Game</h1>
    <p class="sr-only">Can you spot the differences between Arial and Helvetica? Times New Roman and Baskerville? Identify the correct font to score points.</p>
    
    <div id="game-container"></div>
    
    <script src="game.js"></script>
</body>
</html>
